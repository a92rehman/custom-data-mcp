# Project Registry — single source of truth for all Taleemabad projects.
# Adding a new project: add an entry here. No code changes needed.
# Status values: active | inactive | system

projects:
  - name: "ICT/Islamabad"
    dataset: "tbproddb"
    status: "active"
    region: "ict-islamabad"
    description: "ICT school program — teachers, lesson plans, coaching, training, ACR/promotion policy"
    children:
      - name: "Teacher ACR / Promotion"
        table: "fico_kpis"
        description: "FICO → ACR KPI mapping (6 KPIs, scored 0-10, total/60)"
        status: "active"
      - name: "Student Results"
        table: "student_results_data"
        description: "Teacher → student outcome link (early stage, under development)"
        status: "dev"

  - name: "TaleemHub (RWP)"
    dataset: "TaleemHub_DB"
    status: "active"
    region: "rawalpindi"
    description: "Rawalpindi teacher platform — roster, mentoring visits, ASER"

  - name: "Rumi AI (RWP)"
    dataset: "RUMI_DB"
    status: "active"
    region: "rawalpindi"
    description: "AI coaching, lesson plans, reading assessments for RWP"

  - name: "Muawin/Akhuwat (Schoolpilot)"
    dataset: "Muawin_Akhuwat_db"
    status: "active"
    region: "moawin-akhuwat"
    description: "Schoolpilot for Moawin + Akhuwat — teacher roster, student scores, institutional data"

  - name: "Zavia"
    dataset: "Zavia_db"
    status: "active"
    region: "moawin-akhuwat"
    description: "Zavia AI platform — coaching, lesson plans, reading assessments for Moawin/Akhuwat"

  - name: "MCP Audit"
    dataset: "mcp_audit"
    status: "system"
    region: null
    description: "Internal audit logging for MCP queries and feedback"

  - name: "Rawalpindi Prod"
    dataset: "rwp_proddb"
    status: "inactive"
    region: null
    description: "RWP production database mirror — use TaleemHub_DB + RUMI_DB instead"

  - name: "Balochistan"
    dataset: "bl_proddb"
    status: "inactive"
    region: null
    description: "Balochistan program — data exists but stale (last updated Sep 2025)"

  - name: "ODK Surveys"
    dataset: "odk"
    status: "inactive"
    region: null
    description: "Field survey data from ODK — ASER, TEACH, baseline/endline"
